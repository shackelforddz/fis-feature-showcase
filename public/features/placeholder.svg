<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Feature screenshot placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#374151" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
  <g fill="#9ca3af" font-family="system-ui, sans-serif" text-anchor="middle">
    <text x="800" y="450" font-size="48" font-weight="500">Feature screenshot placeholder</text>
    <text x="800" y="500" font-size="24" opacity="0.7">1600 × 900</text>
  </g>
</svg>
